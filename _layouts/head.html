<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Serviços de reparações domésticas no concelho de Elvas: canalização, eletricidade, pequenas obras, montagens e pinturas. Atendimento rápido e profissional.">
    <meta name="keywords" content="reparações domésticas Elvas, canalizador Elvas, eletricista Elvas, montagens Elvas, pinturas Elvas, serviços casa Elvas">
    <title>Repara Rápido - Reparações Domésticas</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #333;
        }

        /* -------------------------------------------------------------
           HERO
        ------------------------------------------------------------- */
        .hero {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            text-align: center;
            padding: 60px 20px 70px;
        }
        .hero img {
            height: 70px;
            margin-bottom: 18px;
        }
        .hero h1 {
            font-size: 2.6rem;
            margin: 0;
            font-weight: 700;
        }
        .hero p {
            margin-top: 10px;
            font-size: 1.25rem;
            opacity: 0.95;
        }
        .cta {
            margin-top: 25px;
            background: #ffeb3b;
            padding: 12px 28px;
            font-size: 1.15rem;
            color: #000;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }

        /* -------------------------------------------------------------
           SECÇÕES
        ------------------------------------------------------------- */
        .section {
            padding: 50px 20px;
            max-width: 1100px;
            margin: auto;
        }
        .section h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 25px;
            color: #111;
        }

        /* -------------------------------------------------------------
           SERVIÇOS
        ------------------------------------------------------------- */
        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }
        .service-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .service-box svg {
            width: 42px;
            height: 42px;
            margin-bottom: 10px;
        }
        .service-box h3 {
            margin-top: 5px;
            margin-bottom: 10px;
            color: #d97706;
            font-size: 1.2rem;
        }
        .service-box p {
            font-size: 0.95rem;
            line-height: 1.4rem;
        }

        /* -------------------------------------------------------------
           CONTACTO
        ------------------------------------------------------------- */
        .contact {
            background: #023e8a;
            color: white;
            padding: 50px 20px;
            text-align: center;
        }
        .contact a {
            color: #ffd60a;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.15rem;
        }

        /* -------------------------------------------------------------
           FAQ
        ------------------------------------------------------------- */
        .faq-item {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.06);
        }
        .faq-item h4 {
            margin: 0 0 8px 0;
            color: #d97706;
        }

        /* -------------------------------------------------------------
           FOOTER
        ------------------------------------------------------------- */
        footer {
            background: #001219;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
